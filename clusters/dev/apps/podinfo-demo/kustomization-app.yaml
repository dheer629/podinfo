apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo-demo
  namespace: flux-system
  labels:
    app.kubernetes.io/managed-by: fluxonm
spec:
  interval: 1m
  retryInterval: 30s
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: podinfo-demo-source
  path: ./kustomize
  prune: true
  wait: true
  targetNamespace: podinfo-demo
